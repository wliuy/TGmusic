<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4d7c5f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sarah">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="https://tc.yang.pp.ua/file/logo/sarah-y.png">
    <title>Sarah</title>
    <link rel="icon" type="image/png" sizes="192x192" href="https://tc.yang.pp.ua/file/logo/sarah-y.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dynamic-accent: #d97706; --solara-text: #1e293b; --glass-blur: blur(40px);
            --main-glass: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            --inner-glass: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.25);
            --m-green: #4d7c5f; --btn-icon-color: #ffffff;
            --logo-url: url('https://tc.yang.pp.ua/file/logo/sarah(1).png');
        }

        body { color: var(--solara-text); font-family: 'Noto Sans SC', sans-serif; height: 100vh; margin: 0; overflow: hidden; background: #fdf2f2; transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #bg-stage { position: fixed; inset: 0; z-index: -2; transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        #bg-overlay { position: fixed; inset: 0; z-index: -1; opacity: 0; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }

        .desktop-container { 
            width: 96%; max-width: 1350px; height: 82vh; 
            background: var(--main-glass); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.1); 
            display: flex; flex-direction: column; padding: 24px 44px; gap: 16px; 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
            justify-content: space-between; transition: all 1.2s ease; 
        }

        .settings-corner { position: absolute; right: 32px; top: 25px; z-index: 200; display: flex; align-items: center; justify-content: center; }
        .brand-title { font-size: 3rem; font-weight: 900; color: white; text-align: center; }
        .brand-sub { font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.6); text-align: center; margin-top: 12px; font-style: italic; }

        .search-panel { background: rgba(255, 255, 255, 0.15); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 20px 36px; display: flex; gap: 16px; align-items: center; }
        .search-capsule { flex: 1; height: 44px; background: rgba(255, 255, 255, 0.25); border-radius: 12px; display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); padding-right: 12px; }
        .search-input-field { flex: 1; background: transparent; border: 0; outline: none; padding: 0 16px; font-weight: 700; font-size: 1.15rem; color: #1e293b; }
        .search-confirm-btn { background: var(--dynamic-accent); color: white; padding: 0 32px; height: 44px; border-radius: 12px; font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: 0.3s; }
        .clear-search-icon { width: 24px; height: 24px; display: grid; place-items: center; opacity: 0.3; cursor: pointer; transition: 0.2s; color: #1e293b; }
        .clear-search-icon:hover { opacity: 0.8; }

        .content-layout { flex: 1; display: grid; grid-template-columns: 0.65fr 1fr 1fr; gap: 24px; overflow: hidden; max-height: 55%; margin: 10px 0; }
        .panel-box { background: var(--inner-glass); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; overflow: hidden; }
        
        .song-item { padding: 12px 16px; margin: 3px 8px; border-radius: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; position: relative; padding-right: 110px; }
        .song-item.active { background: rgba(255, 255, 255, 0.3); color: var(--dynamic-accent); font-weight: 900; }
        .song-item:hover:not(.active) { background: rgba(255, 255, 255, 0.15); }
        .song-title-text { font-size: 13px !important; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist-text { font-size: 11px !important; opacity: 0.5; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-actions { position: absolute; right: 12px; display: flex; gap: 8px; opacity: 0; transition: 0.2s; pointer-events: auto; }
        .song-item:hover .song-actions { opacity: 1; }
        .action-btn { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 8px; background: rgba(255,255,255,0.15); color: inherit; transition: 0.2s; }
        .action-btn:hover { background: var(--dynamic-accent); color: white !important; transform: scale(1.1); }
        .action-btn.is-fav { color: #ef4444 !important; }
        .action-btn.is-fav:hover { background: rgba(239, 68, 68, 0.15); color: #ef4444 !important; }

        .lyrics-panel { flex: 1; height: 100%; width: 100%; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); overflow-y: auto; scroll-behavior: smooth; text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; background: transparent !important; padding-top: 45%; padding-bottom: 45%; }
        .lrc-line { display: block; width: 90%; padding: 10px 14px; font-size: 14px; font-weight: 600; color: #475569; transition: all 0.4s ease; flex-shrink: 0; opacity: 0.5; }
        .lrc-line.active { color: var(--dynamic-accent); background: rgba(255, 255, 255, 0.25); border-radius: 10px; font-weight: 900; opacity: 1; backdrop-filter: blur(10px); transform: scale(1.1); }

        .footer-bar { height: 90px; background: transparent; display: flex; align-items: center; padding: 0 10px; gap: 24px; margin-top: auto; }
        .btn-round { width: 44px; height: 44px; border-radius: 50%; background: var(--dynamic-accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: background 0.3s; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); color: var(--btn-icon-color); border: 0 !important; overflow: hidden; }
        @media (hover: hover) { .btn-round:not(.m-header *):hover { transform: translateY(-3px); } }
        .btn-main { width: 56px !important; height: 56px !important; }

        .scrubber-area { flex: 1; display: flex; align-items: center; gap: 16px; margin: 0 20px; }
        /* 物理级根治点1：移除溢出隐藏，确保圆点白框不再被截断 */
        .rail { flex: 1; height: 6px; background: rgba(0, 0, 0, 0.08); border-radius: 10px; position: relative; cursor: pointer; overflow: visible !important; }
        .fill { height: 100%; background: var(--dynamic-accent); border-radius: 10px; width: 0%; position: relative; z-index: 5; transition: width 0.1s linear; }
        .buffer-fill { height: 100%; background: rgba(255, 255, 255, 0.35); border-radius: 10px; width: 0%; position: absolute; left: 0; top: 0; z-index: 2; transition: width 0.4s ease; }
        
        /* 播放进度圆点精修：仅保留核心实心与单层锐利白边 */
        .dot { 
            position: absolute; right: -8px; top: 50%; transform: translateY(-50%); 
            width: 16px; height: 16px; 
            background: var(--dynamic-accent); 
            border: 2px solid white; 
            border-radius: 50%; 
            cursor: grab; z-index: 100 !important; 
            transition: transform 0.2s;
        }
        .dot:hover { transform: translateY(-50%) scale(1.15); }
        
        .volume-control { width: 150px; display: flex; align-items: center; gap: 12px; }
        .volume-rail { flex: 1; height: 4px; background: rgba(0, 0, 0, 0.08); border-radius: 10px; position: relative; cursor: pointer; overflow: visible !important; }

        .cover-container { 
            width: 14rem; height: 14rem; border-radius: 1.5rem; overflow: hidden; margin-bottom: 2rem; 
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            display: flex; align-items: center; justify-content: center; position: relative; 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px);
        }
        .cover-img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; position: absolute; inset: 0; }
        .cover-placeholder { position: absolute; inset: 0; z-index: 5; display: flex; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; background: var(--logo-url); background-size: cover; background-position: center; }

        .mobile-player-container { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 10px; background: var(--m-green); }
        .m-header { height: 50px; width: 100%; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: transparent; border: none !important; box-shadow: none !important; }
        .m-header .btn-round { background: transparent !important; border: 0 !important; box-shadow: none !important; width: 44px; height: 44px; color: white !important; z-index: 210; }

        .m-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; width: 100%; padding: 45px 0 0 0; }
        .m-controls-capsule { background: transparent; border: 0; padding: 0 15px 45px 15px; width: 100%; flex-shrink: 0; }
        #m-scrubber-wrap { position: relative; height: 32px; display: flex; align-items: center; cursor: pointer; touch-action: none; margin-bottom: -4px; z-index: 10; }
        #m-scrubber-wrap .rail { width: 100%; height: 4px; border-radius: 10px; }

        @keyframes disc-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .m-disc-container { width: 72vw; max-width: 280px; aspect-ratio: 1/1; position: relative; flex-shrink: 0; background: transparent !important; border-radius: 50% !important; isolation: isolate; margin: 0px 0; }
        .m-disc-shadow-layer { position: absolute; inset: -45px; border-radius: 50%; background: radial-gradient(circle at center, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.15) 45%, transparent 72%); z-index: 0; pointer-events: none; }
        .m-disc-clipping { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50% !important; overflow: hidden !important; border: 6px solid rgba(255, 255, 255, 0.12); clip-path: circle(50% at 50% 50%); -webkit-mask-image: -webkit-radial-gradient(white, black); z-index: 5; animation: disc-rotate 25s linear infinite; animation-play-state: paused; }
        .m-disc-container.playing .m-disc-clipping { animation-play-state: running; }
        .m-disc-clipping img { width: 100%; height: 100%; object-fit: cover; border-radius: 50% !important; }

        .m-lyrics-panel { flex: 1; width: 100%; height: auto !important; position: relative; display: flex; flex-direction: column; align-items: center; overflow-y: auto; scroll-behavior: smooth; mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%); pointer-events: none; background: transparent !important; margin-bottom: 0px; margin-top: 10px; }
        .m-lyrics-panel::-webkit-scrollbar { display: none; }
        .m-lyrics-panel .lrc-line { background: transparent !important; text-align: center; color: white; opacity: 0.3; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 0 !important; padding: 6px 10px; font-size: 14px; width: 90%; transform: scale(0.95); flex-shrink: 0; transform-origin: center; }
        .m-lyrics-panel .lrc-line.active { display: block !important; font-size: 1.15rem; opacity: 1; font-weight: 900; transform: scale(1.08); color: white; text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }

        .m-info-wrap { width: 100%; text-align: center; color: white; flex-shrink: 0; height: 60px; margin-top: 0; margin-bottom: 0; }
        .m-song-title { font-size: 1.25rem; font-weight: 900; letter-spacing: 0.05em; margin-bottom: 0px; }
        .m-artist-row { display: flex; align-items: center; justify-content: center; gap: 8px; opacity: 0.6; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.1em; }
        
        .m-controls { width: 100%; flex-shrink: 0; }
        .m-time-row { display: flex; justify-content: space-between; width: 100%; padding: 8px 2px 0 2px; margin-top: -4px; }
        .m-time-text { font-size: 10px; font-weight: 900; opacity: 0.5; color: white; }
        
        .m-btn-row { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-top: 15px; }
        .m-btn-row .btn-round { width: 50px; height: 50px; background: white !important; color: var(--m-green) !important; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); border: 0 !important; display: grid; place-items: center; flex-shrink: 0; }
        .m-btn-row .btn-main { width: 68px !important; height: 68px !important; }

        #m-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 999; display: none; }
        .m-drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh; background: var(--m-green) !important; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 1000; border-radius: 32px 32px 0 0; transition: 0.45s cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.08); }
        .m-drawer.active { bottom: 0; }
        
        #m-pl-cards { display: flex; gap: 0px; overflow-x: auto; padding: 15px 20px 0 20px; flex-shrink: 0; border-bottom: 1.5px solid rgba(255, 255, 255, 0.1); }
        #m-pl-cards::-webkit-scrollbar { display: none; }
        
        .m-pl-card { 
            flex-shrink: 0; height: 34px; min-width: 65px; padding: 0 16px; 
            border-radius: 10px 10px 0 0; background: rgba(255, 255, 255, 0.06); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: none; 
            display: flex; align-items: center; justify-content: center; 
            margin-right: 3px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white !important; font-size: 11px; font-weight: 700;
        }
        .m-pl-card.active { 
            background: rgba(255, 255, 255, 0.18) !important; 
            border-color: rgba(255, 255, 255, 0.25) !important; 
            transform: translateY(1.5px); 
            z-index: 10; font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .m-list-search-wrap { padding: 12px 20px 10px 20px; flex-shrink: 0; display: flex; align-items: center; position: relative; }
        .m-list-search-box { width: 100%; height: 46px; background: rgba(255, 255, 255, 0.08); border: 1.5px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 0 45px 0 20px; color: white; font-size: 14px; font-weight: 700; outline: none; }
        .m-clear-search { position: absolute; right: 35px; color: white; opacity: 0.5; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .sarah-dialog-overlay.active { display: flex !important; }
        
        #admin-box { width: 92%; max-width: 900px; height: 85vh; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(60px); border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 50px 100px rgba(0, 0, 0, 0.3); outline: none !important; }
        .admin-header { padding: 10px 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; min-height: 70px; }
        .admin-header-center { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 0 20px; flex-shrink: 0; }
        .admin-console-box { background: rgba(255, 255, 255, 0.05); border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 20px; width: auto; max-width: 100%; }

        .admin-action-bar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .admin-btn-icon { width: 38px; height: 38px; display: grid; place-items: center; background: rgba(255, 255, 255, 0.1); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); transition: 0.25s; cursor: pointer; color: white; backdrop-filter: brightness(1.1); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); padding: 0 !important; }
        .admin-btn-icon:hover { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.3); transform: scale(1.05); }
        .admin-btn-icon:active { transform: scale(0.92); }
        .admin-btn-icon svg { width: 18px; height: 18px; display: block; margin: auto; }

        @media (max-width: 768px) { 
            #admin-box { width: 90% !important; max-width: 440px; background: var(--m-green) !important; border-radius: 30px; height: 85vh; } 
            .admin-header { padding: 12px 15px; flex-direction: row; justify-content: space-between; align-items: center; gap: 0; height: auto; min-height: 60px; flex-wrap: wrap; }
            #admin-header-center { flex: none; width: 100%; order: 10; padding: 10px 0; }
            .browser-tab { min-width: 60px; max-width: 100px; padding: 0 8px; cursor: pointer; }
        }

        #msg-box { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--dynamic-accent); color: white; padding: 15px 50px; border-radius: 100px; font-weight: 900; z-index: 5000; transition: 0.5s; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1); }
        #msg-box.active { transform: translateX(-50%) translateY(0); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        @media (max-width: 768px) { .desktop-container { display: none; } .mobile-player-container { display: flex; } }
    </style>
</head>
<body>
    <div id="msg-box"></div>
    <div id="bg-stage"></div>
    <div id="bg-overlay"></div>

    <!-- Sarah Dialog UI -->
    <div id="sarah-dialog" class="sarah-dialog-overlay fixed inset-0 bg-black/60 backdrop-blur-2xl z-[3000] hidden items-center justify-center" onclick="closeSarahDialog()">
        <div class="sarah-dialog-box w-[320px] bg-[#1e293b]/95 border border-white/10 rounded-[2.5rem] p-8 shadow-2xl scale-95 opacity-0 transition-all duration-300 pointer-events-none" onclick="event.stopPropagation()">
            <h4 id="dialog-title" class="text-white font-black text-xl mb-2 text-center tracking-tight">提示</h4>
            <p id="dialog-msg" class="text-white/60 text-xs mb-8 text-center leading-relaxed px-4"></p>
            <div id="dialog-input-wrap" class="hidden mb-8">
                <input id="dialog-input" class="w-full bg-white/5 p-4 rounded-2xl text-white text-sm outline-none border border-white/10 focus:border-[#4d7c5f]/50 focus:bg-white/10 transition-all shadow-inner" placeholder="请输入...">
            </div>
            <div class="flex gap-3">
                <button id="dialog-cancel" onclick="closeSarahDialog()" class="flex-1 py-4 bg-white/5 text-white/50 hover:text-white hover:bg-white/10 rounded-2xl text-[11px] font-black transition-all active:scale-95">取消</button>
                <button id="dialog-confirm" class="flex-1 py-4 bg-[#4d7c5f] hover:bg-[#5a8f6e] text-white rounded-2xl text-[11px] font-black shadow-lg transition-all active:scale-95">确认</button>
            </div>
        </div>
    </div>

    <div id="playlist-selector-modal" class="fixed inset-0 bg-black/60 backdrop-blur-xl z-[3000] hidden items-center justify-center" onclick="closePlaylistSelector()">
        <div class="playlist-select-box w-[300px] bg-[#1e293b]/80 backdrop-blur-3xl border border-white/10 rounded-3xl p-6 shadow-2xl" onclick="event.stopPropagation()">
            <h4 class="text-white font-black text-sm mb-5 uppercase tracking-widest text-center">分发至歌单</h4>
            <div id="playlist-selector-list" class="space-y-3 max-h-[350px] overflow-y-auto custom-scroll"></div>
            <button onclick="closePlaylistSelector()" class="w-full mt-6 py-3 bg-white/10 text-white rounded-xl text-xs font-black">取消分发</button>
        </div>
    </div>

    <div class="desktop-container" id="main-ui">
        <header class="header-stack">
            <h1 class="brand-title">Sarah</h1>
            <p class="brand-sub">Premium Music Hub | v10.1.9</p>
            <div class="settings-corner">
                <!-- 设置按钮：更换为高精度垂直滑块图标 (Sliders) -->
                <div onclick="toggleAdmin(true)" class="btn-round !bg-white/10 border border-white/25 !shadow-xl hover:scale-110 cursor-pointer flex items-center justify-center p-0 overflow-hidden" id="pc-settings-trigger">
                    <svg class="w-6 h-6 flex-shrink-0" style="shape-rendering: crispEdges;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/>
                    </svg>
                </div>
            </div>
        </header>
        <div class="search-panel">
            <div class="search-capsule">
                <input type="text" id="search-input" oninput="handleSearch()" placeholder="搜索列表内旋律..." class="search-input-field">
                <div id="pc-clear-search" class="clear-search-icon" onclick="clearSearch('search-input')"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M6 18L18 6M6 6l12 12"></path></svg></div>
            </div>
            <button id="pc-search-btn" class="search-confirm-btn" onclick="handleSearch()">搜索</button>
        </div>
        <main class="content-layout">
            <section class="panel-box p-6 items-center text-center">
                <div class="cover-container shadow-sm border border-white/20 mx-auto" id="pc-cover-wrap"><div class="cover-placeholder rounded-2xl" id="pc-logo-box"></div><img id="ui-cover" src="" class="cover-img rounded-2xl" style="display:none"></div>
                <div class="mt-6 flex flex-col items-center w-full">
                    <h2 id="ui-title" class="text-base font-black text-slate-800 truncate w-full mb-1">歌曲标题</h2>
                    <p id="ui-artist" class="text-[11px] font-black opacity-40 uppercase truncate w-full"></p>

    <div id="ap-hidden" style="display:none"></div>
    <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
    <script>
        let ap = null, db = [], lrcLines = [], currentTab = 'fav', tempMetaMap = new Map(), globalPlayingId = null;
        let modeIdx = 0, dbIndexMap = new Map(), lastVolume = 0.7, isMuted = false, currentAdminTab = 'all';
        let currentThemeIdx = -1, sleepEndTime = null, sleepTimerInt = null, isScrubbing = false, isDraggingVol = false;
        let lastActiveFileId = null, longPressTimer = null, initialTouchY = 0, currentDraggedEl = null, dragPlaceholder = null, touchOffsetTop = 0; 
        let libState = { songs: [], favorites: [], playlists: [], all_order: [] };
        let globalUploadQueue = [], uploadActiveWorkers = 0, preloadedFids = new Set();
        let renderCount = 20, pageSize = 20, isPlaylistSwitching = false, globalActiveListId = 'fav';
        let lastBackgroundUpdateId = null, isDarkMode = false;

        const modes = ['list', 'single', 'random'], DEFAULT_LOGO = 'https://tc.yang.pp.ua/file/logo/sarah(1).png';
        const solaraTheme = [
            { bg: '#f0fdf4', accent: '#10b981', deep: '#064e3b' },
            { bg: '#fff1f2', accent: '#fb7185', deep: '#881337' },
            { bg: '#f0f9ff', accent: '#0ea5e9', deep: '#0c4a6e' },
            { bg: '#faf5ff', accent: '#a855f7', deep: '#3b0764' },
            { bg: '#fdf4ff', accent: '#d946ef', deep: '#701a75' },
            { bg: '#fff7ed', accent: '#f97316', deep: '#7c2d12' },
            { bg: '#f8fafc', accent: '#64748b', deep: '#0f172a' },
            { bg: '#fdf2f8', accent: '#ec4899', deep: '#831843' },
            { bg: '#f0fdfa', accent: '#14b8a6', deep: '#134e4a' },
            { bg: '#fafaf9', accent: '#78716c', deep: '#292524' },
            { bg: '#eef2ff', accent: '#6366f1', deep: '#1e1b4b' },
            { bg: '#fffbeb', accent: '#d97706', deep: '#78350f' },
            { bg: '#f7fee7', accent: '#65a30d', deep: '#1a2e05' },
            { bg: '#020617', accent: '#38bdf8', deep: '#000000' },
            { bg: '#f5f3ff', accent: '#8b5cf6', deep: '#2e1065' },
            { bg: '#fff5f7', accent: '#f472b6', deep: '#831843' }
        ];

        async function dbOp(action, data = {}) {
            try {
                const res = await fetch('/api/manage', { method: 'POST', body: JSON.stringify({ action, data }) });
                const result = await res.json();
                if (!result.success) console.error("D1 Action Error:", result.error);
                return result;
            } catch (e) { console.error(e); return { success: false }; }
        }

        async function init() {
            updateBackground(true);
            ['main-ui', 'm-player'].forEach(id => {
               const el = document.getElementById(id);
               if(el) el.style.display = id === 'main-ui' ? 'flex' : (window.innerWidth <= 768 ? 'flex' : 'none');
            });

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) { }
                        });
                    });
                }).catch(() => {});
            }
            try {
                const cache = await caches.open('api-cache');
                const cachedRes = await cache.match('/api/songs');
                if (cachedRes) {
                    const cachedData = await cachedRes.json();
                    libState = cachedData; db = libState.songs;
                    buildIndexMap(); renderCustomTabs(); setupPlayer(); renderAllLists();
                }
                const res = await fetch('/api/songs'); const raw = await res.json();
                if (raw.error) { console.error("D1 Loader Error"); return; }
                cache.put('/api/songs', new Response(JSON.stringify(raw)));
                if (JSON.stringify(libState) !== JSON.stringify(raw)) {
                    libState = raw; db = libState.songs;
                    buildIndexMap(); renderCustomTabs(); 
                    setupPlayer(); 
                    renderAllLists();
                }
                updateUIModes(); updateVolUI(lastVolume); 
                window.addEventListener('keydown', (e) => { if (e.code === 'Space') { const activeEl = document.activeElement; if (activeEl.tagName !== 'INPUT' && activeEl.tagName !== 'TEXTAREA') { e.preventDefault(); handlePlayToggle(); } } });
                history.replaceState({stage:'main'}, '');
                window.onpopstate = (e) => {
                    const drawer = document.getElementById('m-drawer');
                    const admin = document.getElementById('admin-panel');
                    const selector = document.getElementById('playlist-selector-modal');
                    const dialog = document.getElementById('sarah-dialog');
                    if (dialog && !dialog.classList.contains('hidden')) { closeSarahDialog(); return; }
                    if (selector && !selector.classList.contains('hidden')) { closePlaylistSelector(); return; }
                    if (admin && admin.classList.contains('active')) { toggleAdmin(false, true); return; }
                    if (drawer && drawer.classList.contains('active')) { toggleMobileDrawer(false, true); return; }
                };
                if (libState.favorites.length > 0) { 
                    const f = libState.favorites[0]; 
                    globalActiveListId = 'fav'; 
                    currentTab = 'fav';
                    refreshUIMetaAt(dbIndexMap.get(f)); 
                    updateHighlights(f, true); 
                }
                else if (libState.all_order.length > 0) refreshUIMetaAt(dbIndexMap.get(libState.all_order[0]));
                else if (db.length > 0) refreshUIMetaAt(0);
            } catch (e) { console.error(e); }
        }

        async function silentRefresh() {
          try {
            const res = await fetch('/api/songs'); const raw = await res.json();
            if (raw.error) return;
            const cache = await caches.open('api-cache');
            cache.put('/api/songs', new Response(JSON.stringify(raw)));
            let curFid = null;
            if(ap && ap.list.audios[ap.list.index]) {
                curFid = new URL(ap.list.audios[ap.list.index].url, window.location.origin).searchParams.get('file_id');
            }
            libState = raw; db = libState.songs;
            buildIndexMap();
            if(ap) {
              let ids = [];
              const sourceId = globalActiveListId; 
              if(sourceId === 'all') ids = libState.all_order.length ? libState.all_order : db.map(s => s.file_id);
              else if(sourceId === 'fav') ids = libState.favorites;
              else ids = libState.playlists.find(p => p.id === sourceId)?.ids || [];
              const newList = ids.map(id => {
                const s = db[dbIndexMap.get(id)];
                return s ? { name: s.title, artist: s.artist, cover: s.cover || DEFAULT_LOGO, url: '/api/stream?file_id=' + s.file_id, lrc: s.lrc || '[00:00.00]暂无歌词' } : null;
              }).filter(Boolean);
              ap.list.audios = newList;
              if (curFid) {
                  const newIndex = ids.indexOf(curFid);
                  if (newIndex !== -1) { ap.list.index = newIndex; }
              }
            }
            if(document.getElementById('admin-panel').classList.contains('active')) {
              renderAdminPlaylistTabs(); renderAdminSongList();
            }
          } catch (e) { console.error(e); }
        }

        function buildIndexMap() { dbIndexMap.clear(); for(let j = 0; j < db.length; j++) dbIndexMap.set(db[j].file_id, j); }
        
        function setupPlayer() {
            let ids = [];
            const sourceId = globalActiveListId;
            if(sourceId === 'all') ids = libState.all_order.length ? libState.all_order : db.map(s => s.file_id);
            else if(sourceId === 'fav') ids = libState.favorites;
            else ids = libState.playlists.find(p => p.id === currentTab)?.ids || [];
            const trackList = ids.map(id => {
              const s = db[dbIndexMap.get(id)];
              if (!s) return null;
              const isFlac = (s.title && s.title.toLowerCase().includes('.flac')) || (s.lrc && s.lrc.includes('flac'));
              return { 
                name: s.title, artist: s.artist, 
                cover: s.cover || DEFAULT_LOGO, 
                url: '/api/stream?file_id=' + s.file_id, 
                lrc: s.lrc || '[00:00.00]暂无歌词',
                type: isFlac ? 'flac' : 'normal'
              };
            }).filter(Boolean);
            if (ap) {
                const currentTrackUrls = ap.list.audios.map(a => a.url);
                const newTrackUrls = trackList.map(a => a.url);
                if (JSON.stringify(currentTrackUrls) !== JSON.stringify(newTrackUrls)) {
                    ap.list.clear();
                    ap.list.add(trackList);
                }
                return;
            }
            ap = new APlayer({ container: document.getElementById('ap-hidden'), lrcType: 1, audio: trackList, volume: lastVolume || 0.7 });
            ap.audio.addEventListener('progress', () => {
                const audio = ap.audio;
                if (audio.buffered.length > 0) {
                    const bufferedEnd = audio.buffered.end(audio.buffered.length - 1);
                    const duration = audio.duration;
                    if (duration > 0) {
                        const p = (bufferedEnd / duration) * 100 + "%";
                        ['prog-buffer', 'm-prog-buffer'].forEach(id => {
                            const el = document.getElementById(id);
                            if(el) el.style.width = p;
                        });
                    }
                }
            });
            ap.on('play', () => { 
                const s = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>'; 
                document.getElementById('p-icon').innerHTML = s; document.getElementById('m-p-icon').innerHTML = s; 
                document.getElementById('m-disc-wrapper').classList.add('playing'); 
                const cur = ap.list.audios[ap.list.index];
                if (cur) {
                    const fid = new URL(cur.url, window.location.origin).searchParams.get('file_id');
                    if (fid && fid !== globalPlayingId) {
                        globalPlayingId = fid;
                        refreshUIMetaByAudio(cur);
                    }
                    if (fid !== lastBackgroundUpdateId) {
                        lastBackgroundUpdateId = fid;
                        updateBackground(true);
                    }
                    updateHighlights(fid, false);
                }
                updateMediaSession(); 
            });
            ap.on('pause', () => { 
                const s = '<path d="M8 5v14l11-7z"></path>'; 
                document.getElementById('p-icon').innerHTML = s; document.getElementById('m-p-icon').innerHTML = s; 
                document.getElementById('m-disc-wrapper').classList.remove('playing'); 
                updateMediaSession();
            });
            ap.on('timeupdate', () => { 
                if (isScrubbing) return;
                const cur = ap.audio.currentTime, dur = ap.audio.duration || 0, p = (cur / (dur || 1) * 100) + '%';
                ['prog-bar', 'm-prog-bar'].forEach(id => { const el = document.getElementById(id); if(el) el.style.width = p; });
                ['cur-time', 'm-cur-time'].forEach(id => { const el = document.getElementById(id); if(el) el.innerText = fmtTime(cur); });
                ['total-time', 'm-total-time'].forEach(id => { const el = document.getElementById(id); if(el) el.innerText = fmtTime(dur); });
                if (dur > 0 && ap.audio.buffered.length > 0) {
                    const bEnd = ap.audio.buffered.end(ap.audio.buffered.length - 1);
                    const bP = (bEnd / dur * 100) + "%";
                    ['prog-buffer', 'm-prog-buffer'].forEach(id => { const el = document.getElementById(id); if(el) el.style.width = bP; });
                }
                syncLyrics(cur);
                if (dur > 0 && cur / dur > 0.7 && ap.list.audios.length > 1) {
                    const nextIdx = (ap.list.index + 1) % ap.list.audios.length;
                    const nextAudio = ap.list.audios[nextIdx];
                    const nextFid = new URLSearchParams(nextAudio.url.split('?')[1]).get('file_id');
                    if (!preloadedFids.has(nextFid)) {
                        const preNode = document.createElement('audio');
                        preNode.src = nextAudio.url;
                        preNode.preload = "auto";
                        preNode.load();
                        preloadedFids.add(nextFid);
                    }
                }
            });
            ap.on('listswitch', (data) => { 
                if (isPlaylistSwitching) return;
                const targetIdx = data.index !== undefined ? data.index : ap.list.index;
                const audio = ap.list.audios[targetIdx];
                if (audio) {

        async function refreshUIMetaAt(idx) {

                }

        function processLrc(rawLrc) {
            const pattern = /^\[(\d+):(\d+).(\d+)\](.*)/;
            lrcLines = (rawLrc || "").split(/\r?\n/).map(l => { const m = pattern.exec(l); return m ? { t: parseInt(m[1]) * 60 + parseInt(m[2]), text: m[4].trim() } : null; }).filter(v => v && v.text);
            const renderL = (id) => {
                const el = document.getElementById(id); if(!el) return;
                if (!lrcLines.length) { el.innerHTML = '<div class="lrc-line active !opacity-30">暂无歌词</div>'; el.classList.add('justify-center'); }
                else { el.classList.remove('justify-center'); el.innerHTML = '<div style="height:65px;flex-shrink:0;"></div>' + lrcLines.map((l, i) => `<div class="lrc-line" id="${id}-lrc-${i}" onclick="ap.seek(${l.t})">${l.text}</div>`).join('') + '<div style="height:65px;flex-shrink:0;"></div>'; }
            };
            renderL('lrc-view'); renderL('m-lrc-flow');
        }

        function syncLyrics(t) {
            if (!lrcLines.length) return;
            let active = -1; for (let i = 0; i < lrcLines.length; i++) if (t >= lrcLines[i].t) active = i;
            if (active !== -1) {
                ['lrc-view', 'm-lrc-flow'].forEach(id => {
                    const view = document.getElementById(id); if(!view) return;
                    view.querySelectorAll('.lrc-line').forEach((el, i) => el.classList.toggle('active', i === active));
                    const target = document.getElementById(id + '-lrc-' + active);
                    if (target) view.scrollTo({ top: target.offsetTop - (view.offsetHeight / 2) + (target.offsetHeight / 2), behavior: 'smooth' });
                });
            }
        }

        function handleMouseSeekStart(e) { isScrubbing = true; handleMouseSeekMove(e); window.addEventListener('mousemove', handleMouseSeekMove); window.addEventListener('mouseup', handleMouseSeekEnd); }

        function handleMouseSeekEnd(e) { if (!isScrubbing) return; const rect = document.getElementById('pc-scrubber').getBoundingClientRect(); const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)); ap.seek(p * (ap.audio.duration || 0)); isScrubbing = false; window.removeEventListener('mousemove', handleMouseSeekMove); window.removeEventListener('mouseup', handleMouseSeekEnd); }

            libState.playlists.forEach((pl, i) => { 
                const hasLeft = i > 0; const hasRight = i < libState.playlists.length - 1;
                const arrowHtml = isPC ? `<div class="browser-tab-arrow">${hasLeft ? '<span onclick="event.stopPropagation(); movePlaylist(' + i + ', -1)">←</span>' : ''}${hasRight ? '<span onclick="event.stopPropagation(); movePlaylist(' + i + ', 1)">→</span>' : ''}</div>` : '';
                html += `<div class="browser-tab ${currentAdminTab === pl.id ? 'active' : ''}" data-plid="${pl.id}" onclick="switchAdminList('${pl.id}')" onmousedown="${isPC ? 'handleAdminPlaylistDragStart(event, '+i+')' : ''}" ondblclick="renamePlaylistPrompt('${i}')">${arrowHtml}<span class="browser-tab-text">${pl.name} <i class="opacity-40 text-[9px] font-black italic">${pl.ids.length}</i></span><div class="browser-tab-close" onclick="event.stopPropagation(); deletePlaylist('${i}')"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M6 18L18 6M6 6l12 12"></path></svg></div></div>`; 
            });
            html += `<div class="browser-tab" onclick="addPlaylistPrompt()" style="min-width:40px;flex:none;"><span class="browser-tab-text" style="opacity:1;color:white;font-size:14px;font-weight:bold;">+</span></div>`;
            container.innerHTML = html;
        }
        async function renderUploadLogs() {
            const container = document.getElementById('admin-song-list');
            container.innerHTML = '<div class="py-10 text-center text-white/40 animate-pulse">正在获取 D1 日志...</div>';
            const res = await dbOp('get_logs');
            if (!res.success) { container.innerHTML = '<div class="py-10 text-center text-red-300">获取日志失败</div>'; return; }
            container.innerHTML = res.logs.map(log => {
                const dateStr = new Date(log.timestamp + " UTC").toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
                const isFail = log.status !== 'SUCCESS';
                return `
                <div class="px-4 py-2 bg-white/5 rounded-xl mb-1 flex items-center justify-between border border-white/5 ${isFail ? 'bg-red-500/5' : ''}">
                    <div class="flex items-center gap-2 truncate flex-1">
                        <div class="w-1.5 h-1.5 rounded-full ${isFail ? 'bg-red-400 shadow-[0_0_5px_#f87171]' : 'bg-emerald-400 shadow-[0_0_5px_#34d399]'}"></div>
                        <span class="text-[11px] font-bold text-white/80 truncate">${log.filename}</span>
                        ${isFail ? '<span class="text-[9px] text-red-400/60 ml-2 italic truncate">(' + (log.reason || '失败') + ')</span>' : ''}
                    </div>
                    <span class="text-[9px] text-white/20 font-mono ml-4 flex-shrink-0">${dateStr}</span>
                </div>`;
            }).join('') || '<div class="py-10 text-center text-white/20">暂无上传记录</div>';
        }
        function renderAdminSongList() {
            const container = document.getElementById('admin-song-list');
            let ids = [];
            if(currentAdminTab === 'all') ids = libState.all_order.length ? libState.all_order : db.map(s => s.file_id);
            else if(currentAdminTab === 'fav') ids = libState.favorites;
            else if(currentAdminTab === 'logs') { renderUploadLogs(); return; }
            else ids = libState.playlists.find(p => p.id === currentAdminTab)?.ids || [];
            const list = ids.map(id => db[dbIndexMap.get(id)]).filter(Boolean);
            container.innerHTML = list.map((s, i) => `<div class="admin-song-row" id="admin-row-${i}" data-fileid="${s.file_id}" onmousedown="handleAdminDragStart(event, ${i}, false)" ontouchstart="handleAdminDragStart(event, ${i}, true)"><div class="admin-song-info"><input class="admin-song-input admin-song-title-input" value="${s.title}" readonly onchange="updateSongInfo('${s.file_id}', 'title', this.value)"><input class="admin-song-input admin-song-artist-input" value="${s.artist}" readonly onchange="updateSongInfo('${s.file_id}', 'artist', this.value)"></div><div class="admin-action-group"><div class="admin-action-btn" onclick="openPlaylistSelector('${s.file_id}')" title="分发"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div><div class="admin-action-btn delete" onclick="deleteSong('${s.file_id}')" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></div><div class="admin-action-btn" onclick="toggleEditMode(${i})" title="编辑"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></div>`).join('') || '<div class="py-10 text-center text-white/20 text-xs">暂无歌曲</div>';
        }
        function handleAdminDragStart(e, idx, isTouch) {
            if ((e.target.tagName === 'INPUT' && !e.target.readOnly) || e.target.closest('.admin-action-btn')) return;
            const targetEl = e.currentTarget; if (targetEl.classList.contains('editing')) return;
            let lastY = isTouch ? e.touches[0].clientY : e.clientY; let lastX = isTouch ? e.touches[0].clientX : e.clientX;
            const initDrag = (cX, cY) => {
                if (currentDraggedEl) return; currentDraggedEl = targetEl; const rect = currentDraggedEl.getBoundingClientRect();
                touchOffsetTop = cY - rect.top; dragPlaceholder = document.createElement('div'); dragPlaceholder.className = 'admin-song-placeholder';
                currentDraggedEl.parentNode.insertBefore(dragPlaceholder, currentDraggedEl);
                const ghost = currentDraggedEl.cloneNode(true); ghost.classList.add('is-dragging'); ghost.style.width = rect.width + 'px'; ghost.style.left = rect.left + 'px'; ghost.style.top = (cY - touchOffsetTop) + 'px'; document.body.appendChild(ghost);
                currentDraggedEl.classList.add('is-hidden');
                const move = (me) => {
                    if (me.cancelable) me.preventDefault(); const mY = me.touches ? me.touches[0].clientY : me.clientY; const mX = me.touches ? me.touches[0].clientX : me.clientX;
                    ghost.style.top = (mY - touchOffsetTop) + 'px'; const hov = document.elementFromPoint(mX, mY)?.closest('.admin-song-row');
                    if (hov && hov !== currentDraggedEl && hov !== dragPlaceholder) { const r = hov.getBoundingClientRect(); if (mY < r.top + r.height / 2) hov.parentNode.insertBefore(dragPlaceholder, hov); else hov.parentNode.insertBefore(dragPlaceholder, hov.nextSibling); }
                };
                const end = async () => {
                    window.removeEventListener(isTouch ? 'touchmove' : 'mousemove', move); window.removeEventListener(isTouch ? 'touchend' : 'mouseup', end);
                    if (dragPlaceholder) { dragPlaceholder.parentNode.insertBefore(currentDraggedEl, dragPlaceholder); dragPlaceholder.remove(); }
                    if (ghost) ghost.remove(); currentDraggedEl.classList.remove('is-hidden');
                    const nIds = Array.from(document.querySelectorAll('#admin-song-list .admin-song-row')).map(r => r.dataset.fileid);
                    const pid = (currentAdminTab === 'all' || currentAdminTab === 'fav') ? currentAdminTab : currentAdminTab;
                    await dbOp('update_order', { playlist_id: pid, ids: nIds }); silentRefresh();
                    currentDraggedEl = null; dragPlaceholder = null;
                };
                window.addEventListener(isTouch ? 'touchmove' : 'mousemove', move, { passive: false }); window.addEventListener(isTouch ? 'touchend' : 'mouseup', end);
            };
            if (isTouch) {
                if(longPressTimer) clearTimeout(longPressTimer); longPressTimer = setTimeout(() => { if (navigator.vibrate) navigator.vibrate(50); initDrag(lastX, lastY); }, 500);
                targetEl.addEventListener('touchmove', (te) => { lastX = te.touches[0].clientX; lastY = te.touches[0].clientY; if (Math.abs(lastY - initialTouchY) > 10) clearTimeout(longPressTimer); }, { passive: true });
                targetEl.addEventListener('touchend', () => clearTimeout(longPressTimer), { once: true });
            } else initDrag(e.clientX, e.clientY);
        }
        async function movePlaylist(idx, dir) {
            if (window.innerWidth <= 768) return; 
            const nIdx = idx + dir; if(nIdx < 0 || nIdx >= libState.playlists.length) return;
            const temp = libState.playlists[idx]; libState.playlists[idx] = libState.playlists[nIdx]; libState.playlists[nIdx] = temp;
            renderAdminPlaylistTabs(); renderCustomTabs(); updateBackground(false);
            const nIds = libState.playlists.map(p => p.id);
            await dbOp('update_playlist_order', { ids: nIds });
        }
        function handleAdminPlaylistDragStart(e, idx) {
            if (window.innerWidth <= 768 || e.target.closest('.browser-tab-close') || e.target.closest('.browser-tab-arrow')) return;
            const targetEl = e.currentTarget; let isMoved = false;
            const startX = e.clientX, startY = e.clientY;
            const initDrag = (cX, cY) => {
                const rect = targetEl.getBoundingClientRect();
                const offsetLeft = cX - rect.left;
                dragPlaceholder = document.createElement('div');
                dragPlaceholder.className = 'browser-tab is-hidden';
                dragPlaceholder.style.width = rect.width + 'px';
                targetEl.parentNode.insertBefore(dragPlaceholder, targetEl);
                const ghost = targetEl.cloneNode(true);
                ghost.classList.add('is-dragging');
                ghost.style.width = rect.width + 'px';
                ghost.style.height = rect.height + 'px';
                ghost.style.left = rect.left + 'px';
                ghost.style.top = rect.top + 'px';
                document.body.appendChild(ghost);
                targetEl.classList.add('is-hidden');
                const move = (me) => {
                    const mX = me.clientX; ghost.style.left = (mX - offsetLeft) + 'px';
                    const hov = document.elementFromPoint(mX, cY)?.closest('.browser-tab');
                    if (hov && hov !== targetEl && hov !== dragPlaceholder && hov.dataset.plid) {
                        const r = hov.getBoundingClientRect();
                        if (mX < r.left + r.width / 2) hov.parentNode.insertBefore(dragPlaceholder, hov);
                        else hov.parentNode.insertBefore(dragPlaceholder, hov.nextSibling);
                    }
                };
                const end = async () => {
                    window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', end);
                    if (dragPlaceholder) { dragPlaceholder.parentNode.insertBefore(targetEl, dragPlaceholder); dragPlaceholder.remove(); }
                    if (ghost) ghost.remove(); targetEl.classList.remove('is-hidden');
                    const nIds = Array.from(document.querySelectorAll('.browser-tab[data-plid]')).map(t => t.dataset.plid);
                    const newPls = nIds.map(id => libState.playlists.find(p => p.id === id)).filter(Boolean);
                    libState.playlists = newPls;
                    renderAdminPlaylistTabs(); renderCustomTabs(); updateBackground(false);
                    await dbOp('update_playlist_order', { ids: nIds });
                };
                window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
            };
            const checkInit = (me) => {
                if (Math.abs(me.clientX - startX) > 5 || Math.abs(me.clientY - startY) > 5) {
                    isMoved = true; window.removeEventListener('mousemove', checkInit); initDrag(me.clientX, me.clientY);
                }
            };
            window.addEventListener('mousemove', checkInit);
            window.addEventListener('mouseup', () => window.removeEventListener('mousemove', checkInit), { once: true });
        }
        function toggleEditMode(idx) {
            const row = document.getElementById('admin-row-' + idx);
            const btn = row.querySelector('.admin-action-btn:last-child');
            const inputs = row.querySelectorAll('.admin-song-input');
            const isEditing = row.classList.contains('editing');
            const fid = row.dataset.fileid;
            if (isEditing) {
                row.classList.remove('editing');
                inputs.forEach(i => i.readOnly = true);
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
                updateSongInfo(fid, 'title', inputs[0].value);
                updateSongInfo(fid, 'artist', inputs[1].value);
            } else {
                row.classList.add('editing');
                inputs.forEach(i => i.readOnly = false);
                inputs[0].focus();
                btn.innerHTML = '<span class="text-xs font-bold">✔</span>';
            }
        }
        async function updateSongInfo(fid, field, val) { const s = db.find(x => x.file_id === fid); if(s) { s[field] = val; await dbOp('update_song', s); silentRefresh(); } }
        function deleteSong(fid) {
            const pid = currentTab;
            showSarahDialog("删除确认", `确定将此旋律从${pid === 'all' ? '全库永久抹去' : '当前歌单移除'}吗？`, false, null, async (y) => { if(y) { await dbOp('delete_song', { file_id: fid, playlist_id: pid }); silentRefresh(); } }); 
        }
        function openPlaylistSelector(fid) {
            document.getElementById('playlist-selector-list').innerHTML = libState.playlists.map(pl => {
                const ex = pl.ids.includes(fid);
                return `<div onclick="addToPlaylist('${pl.id}', '${fid}')" class="p-4 bg-white/10 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-white/20 ${ex?'text-emerald-400 font-bold':''}">${ex ? '<span class="text-emerald-400">' + pl.name + '</span>' : '<span class="text-white">' + pl.name + '</span>'} ${ex ? '<span class="text-[10px] text-emerald-400">已添加</span>' : '<span class="text-white font-bold text-lg">+</span>'}</div>`;
            }).join('');
            document.getElementById('playlist-selector-modal').classList.remove('hidden'); document.getElementById('playlist-selector-modal').classList.add('flex');
        }
        function closePlaylistSelector() { document.getElementById('playlist-selector-modal').classList.add('hidden'); }
        async function addToPlaylist(pid, fid) { 
            const pl = libState.playlists.find(p => p.id === pid);
            if(pl && !pl.ids.includes(fid)) {
                pl.ids.push(fid);
                openPlaylistSelector(fid);
            }
            await dbOp('add_to_playlist', { playlist_id: pid, file_id: fid });
        }
        function addPlaylistPrompt() { showSarahDialog("新歌单", "请输入名称", true, "", async (n) => { if(n) { await dbOp('add_playlist', { name: n }); await silentRefresh(); renderAdminPlaylistTabs(); } }); }
        function renamePlaylistPrompt(idx) { showSarahDialog("重命名", "请输入新名称", true, libState.playlists[idx].name, async (n) => { if(n) { await dbOp('rename_playlist', { id: libState.playlists[idx].id, name: n }); await silentRefresh(); renderAdminPlaylistTabs(); } }); }
        function deletePlaylist(idx) { showSarahDialog("删除", "确定删除此列表吗？", false, null, async (y) => { if(y) { await dbOp('delete_playlist', { id: libState.playlists[idx].id }); silentRefresh(); } }); }
        function previewTag(inp) {
            if (!window.jsmediatags) {
                const s = document.createElement('script');
                s.src = "https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js";
                s.onload = () => previewTag(inp);
                document.head.appendChild(s);
                return;
            }
            const files = Array.from(inp.files); document.getElementById('file-count-tip').innerText = `已选 ${files.length} 首`;
            const container = document.getElementById('upload-preview-list');
            files.forEach((f, i) => {
                const pId = "up-p-" + Date.now() + i;
                container.innerHTML += `<div class="upload-preview-item" id="${pId}"><div class="flex items-center justify-between"><span class="text-xs text-white truncate w-2/3">${f.name}</span><div id="${pId}-s" class="preview-status-dot"></div></div><div class="preview-prog-container" id="${pId}-w"><div class="preview-prog-fill" id="${pId}-f"></div></div></div>`;
                jsmediatags.read(f, { onSuccess: (t) => {
                    const { title, artist, picture, lyrics } = t.tags; let blob = null;
                    if (picture) { const { data, format } = picture; blob = new Blob([new Uint8Array(data)], { type: format }); }
                    tempMetaMap.set(f.name, { title: title || f.name.replace(/\.[^/.]+$/, ""), artist: artist || "未知", coverBlob: blob, lrc: lyrics?.lyrics || "" });
                    if(i === files.length - 1) setTimeout(() => handleUp(files), 500);
                }, onError: () => { if(i === files.length - 1) setTimeout(() => handleUp(files), 500); }});
            });
        }
        async function handleUp(batchFiles) {
            if(!batchFiles.length) return;
            const btn = document.querySelector("#upload-area button"); if(btn) btn.disabled = true;
            const targetPid = (currentAdminTab !== 'all' && currentAdminTab !== 'fav' && currentAdminTab !== 'logs') ? currentAdminTab : null;
            Array.from(batchFiles).forEach((f, i) => {
                const listItems = document.querySelectorAll(".upload-preview-item");
                const pId = listItems[listItems.length - batchFiles.length + i].id;
                globalUploadQueue.push({ f, pId, targetPid });
            });
            const worker = async () => {
                while(globalUploadQueue.length > 0) {
                    const item = globalUploadQueue.shift();
                    if (!item) break;
                    const sDot = document.getElementById(item.pId + "-s"), pFill = document.getElementById(item.pId + "-f");
                    if(sDot) sDot.className = "preview-status-dot uploading";
                    const meta = tempMetaMap.get(item.f.name) || { title: item.f.name };
                    const fd = new FormData(); fd.append('file', item.f); fd.append('meta', JSON.stringify(meta));
                    if (meta.coverBlob) fd.append('cover', meta.coverBlob, 'cover.jpg');
                    if (item.targetPid) fd.append('target_playlist', item.targetPid);
                    const xhr = new XMLHttpRequest(); xhr.open('POST', '/api/upload');
                    xhr.upload.onprogress = e => { if(e.lengthComputable && pFill) pFill.style.width = (e.loaded/e.total*100) + '%'; };
                    await new Promise(r => {
                        xhr.onload = () => { 
                            const res = JSON.parse(xhr.responseText || '{}');
                            if(xhr.status === 200 && res.success) { if(sDot) sDot.className = "preview-status-dot success"; }
                            else { if(sDot) sDot.className = "preview-status-dot error"; }
                            r(); 
                        };
                        xhr.onerror = () => { if(sDot) sDot.className = "preview-status-dot error"; r(); };
                        xhr.send(fd);
                    });
                }
            };
            const startWorkers = () => {
                const workersToStart = Math.min(3 - uploadActiveWorkers, globalUploadQueue.length);
                for(let j=0; j<workersToStart; j++) {
                    uploadActiveWorkers++;
                    worker().then(() => {
                        uploadActiveWorkers--;
                        if (uploadActiveWorkers === 0 && globalUploadQueue.length === 0) {
                            if(btn) btn.disabled = false; 
                            silentRefresh();
                            if(currentAdminTab === 'logs') renderUploadLogs();
                            setTimeout(() => { const list = document.getElementById('upload-preview-list'); if(list) list.innerHTML = ""; }, 10000);
                        } else if (globalUploadQueue.length > 0) {
                            startWorkers();
                        }
                    });
                }
            };
            startWorkers();
        }
        function toggleMobileDrawer(s, fromPop = false) {
            const d = document.getElementById('m-drawer'), o = document.getElementById('m-overlay');
            if(s) { 
                if (!libState.playlists) return;
                const h = [{id:'all',name:'全库'}, {id:'fav',name:'收藏'}, ...libState.playlists.map((p)=>({id:p.id,name:p.name}))];
                document.getElementById('m-pl-cards').innerHTML = h.map(c => `<div data-id="${c.id}" onclick="switchList('${c.id}')" class="m-pl-card ${currentTab===c.id?'active':''}">${c.name}</div>`).join('');
                d.classList.add('active'); o.style.display = 'block'; 
                renderAllLists();
                if(!fromPop) history.pushState({stage:'drawer'}, '');
            } else { 
                d.classList.remove('active'); o.style.display = 'none'; 
            }
        }
        function showMsg(txt) { const b = document.getElementById('msg-box'); b.innerText = txt; b.classList.add('active'); setTimeout(() => b.classList.remove('active'), 3000); }
        window.onload = init;
    </script>
